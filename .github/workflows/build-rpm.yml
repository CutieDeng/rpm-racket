            jobs: 2
            artifact_name: 'rpm-el9-x86_64-cached'
            setup_packages: 'bash diffutils file findutils gcc grep gzip libffi-devel make ncurses-devel openssl-devel perl rpm rpm-build sed sqlite-devel tar which zlib-devel'
